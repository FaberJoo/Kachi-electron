name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-installers:
    name: Build ${{ matrix.platform }} installers
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            command: pnpm dist:mac
          - os: windows-latest
            platform: windows
            command: pnpm dist:win
          - os: ubuntu-latest
            platform: linux
            command: pnpm dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installers
        run: ${{ matrix.command }}

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kachi-${{ matrix.platform }}-installers
          path: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-installers
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: kachi-macos-installers
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: kachi-windows-installers
          path: release-assets

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: kachi-linux-installers
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
